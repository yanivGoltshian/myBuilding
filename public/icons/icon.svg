<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="120" x2="0" y2="414" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eafe"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="88" x2="0" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ff9d2f"/>
    </linearGradient>
    <radialGradient id="glow" cx="170" cy="150" r="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="300" cy="480" r="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b0b3a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#1b0b3a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect width="512" height="512" rx="112" fill="url(#vig)"/>

  <!-- ground platform -->
  <rect x="100" y="402" width="312" height="13" rx="6.5" fill="#ffffff" opacity="0.42"/>

  <!-- side towers -->
  <rect x="124" y="220" width="86" height="186" rx="16" fill="url(#tower)" opacity="0.92"/>
  <rect x="304" y="256" width="86" height="150" rx="16" fill="url(#tower)" opacity="0.85"/>

  <!-- center tower -->
  <rect x="196" y="132" width="120" height="274" rx="22" fill="url(#tower)"/>

  <!-- rooftop broadcasting beacon -->
  <path d="M232 90 Q256 66 280 90" stroke="#ffd27a" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M242 92 Q256 77 270 92" stroke="#ffd27a" stroke-width="5" stroke-linecap="round" fill="none"/>
  <rect x="252" y="100" width="8" height="36" rx="4" fill="url(#tower)"/>
  <circle cx="256" cy="98" r="17" fill="url(#warm)" opacity="0.28"/>
  <circle cx="256" cy="98" r="9" fill="url(#warm)"/>

  <!-- center tower windows -->
  <g fill="url(#warm)">
    <rect x="209" y="158" width="26" height="26" rx="7"/>
    <rect x="243" y="158" width="26" height="26" rx="7"/>
    <rect x="277" y="158" width="26" height="26" rx="7"/>
    <rect x="209" y="198" width="26" height="26" rx="7" opacity="0.5"/>
    <rect x="243" y="198" width="26" height="26" rx="7"/>
    <rect x="277" y="198" width="26" height="26" rx="7"/>
    <rect x="209" y="238" width="26" height="26" rx="7"/>
    <rect x="243" y="238" width="26" height="26" rx="7"/>
    <rect x="277" y="238" width="26" height="26" rx="7" opacity="0.5"/>
    <rect x="209" y="278" width="26" height="26" rx="7"/>
    <rect x="243" y="278" width="26" height="26" rx="7" opacity="0.5"/>
    <rect x="277" y="278" width="26" height="26" rx="7"/>
  </g>

  <!-- side tower windows -->
  <g fill="url(#warm)">
    <rect x="155" y="252" width="24" height="22" rx="6" opacity="0.9"/>
    <rect x="155" y="292" width="24" height="22" rx="6" opacity="0.9"/>
    <rect x="155" y="332" width="24" height="22" rx="6" opacity="0.55"/>
    <rect x="335" y="288" width="24" height="22" rx="6" opacity="0.85"/>
    <rect x="335" y="328" width="24" height="22" rx="6" opacity="0.65"/>
  </g>

  <!-- arch community entrance -->
  <path d="M232 406 L232 364 A24 24 0 0 1 280 364 L280 406 Z" fill="url(#warm)"/>
</svg>
